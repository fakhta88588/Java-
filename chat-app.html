<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AK Poppo Chat Room</title>
    <style>
        :root {
            --primary-color: #ff4757;
            --secondary-color: #2f3542;
            --bg-color: #000000;
            --chat-bg: #1e272e;
            --my-msg-bg: #ff4757;
            --other-msg-bg: #57606f;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            position: absolute;
            top: 0;
            width: 100%;
        }

        .host-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .host-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--primary-color);
            object-fit: cover;
            background: #ddd;
        }

        .host-details h3 {
            font-size: 16px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        .live-badge {
            background-color: red;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        .viewer-count {
            font-size: 12px;
            color: #ccc;
            margin-top: 2px;
            text-shadow: 1px 1px 2px black;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 80px 10px 80px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            text-shadow: 0.5px 0.5px 1px rgba(0,0,0,0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.other {
            align-self: flex-start;
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-bottom-right-radius: 2px;
        }

        .message.my {
            align-self: flex-end;
            background-color: var(--my-msg-bg);
            border-bottom-left-radius: 2px;
        }

        .username {
            font-size: 11px;
            color: #ffd700;
            margin-bottom: 2px;
            font-weight: bold;
        }

        /* Floating Hearts & Gifts */
        .floating-element {
            position: absolute;
            bottom: -50px;
            font-size: 24px;
            animation: floatUp 2s linear forwards;
            pointer-events: none;
            z-index: 5;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        .gift-notification {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            z-index: 20;
            border: 2px solid gold;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            to { transform: translate(-50%, -50%) scale(1); }
        }

        .gift-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 5px;
        }

        /* Footer Controls */
        .controls {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 10px 15px 20px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .input-box {
            flex: 1;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 20px;
            padding: 10px 15px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .input-box::placeholder {
            color: #ccc;
        }

        .btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
            font-size: 20px;
        }

        .btn:active {
            transform: scale(0.9);
        }

        .btn-like {
            color: #ff4757;
        }

        .btn-gift {
            color: #ffa502;
        }

        .send-btn {
            background: var(--primary-color);
            color: white;
            border-radius: 20px;
            width: auto;
            padding: 0 15px;
            font-weight: bold;
        }

        /* Responsive */
        @media (min-width: 768px) {
            body {
                max-width: 480px;
                margin: 0 auto;
                border-left: 1px solid #333;
                border-right: 1px solid #333;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="host-info">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Host" class="host-avatar">
            <div class="host-details">
                <h3>AK Poppo Live <span class="live-badge">LIVE</span></h3>
                <div class="viewer-count">👁️ <span id="viewers">1,245</span> ناظرین</div>
            </div>
        </div>
        <button class="btn" style="background:rgba(255,255,255,0.1)">✖️</button>
    </div>

    <!-- Chat Area -->
    <div class="chat-container" id="chatContainer">
        <div class="message other">
            <div class="username">System</div>
            خوش آمدید! AK Poppo چیٹ روم میں۔
        </div>
    </div>

    <!-- Floating Elements Container -->
    <div id="effectsContainer"></div>

    <!-- Gift Popup -->
    <div id="giftPopup" class="gift-notification" style="display: none;">
        <span class="gift-icon" id="giftIcon">🎁</span>
        <div id="giftText">User ne bheja!</div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="btn btn-gift" onclick="sendGift()">🎁</button>
        <input type="text" id="msgInput" class="input-box" placeholder="پیغام لکھیں..." onkeypress="handleEnter(event)">
        <button class="btn send-btn" onclick="sendMessage()">Send</button>
        <button class="btn btn-like" onclick="sendLike()">❤️</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const msgInput = document.getElementById('msgInput');
        const viewersEl = document.getElementById('viewers');
        const effectsContainer = document.getElementById('effectsContainer');
        const giftPopup = document.getElementById('giftPopup');
        const giftIcon = document.getElementById('giftIcon');
        const giftText = document.getElementById('giftText');

        let viewers = 1245;
        const names = ["علی", "احمد", "حسن", "زینب", "فاطمہ", "عمران", "سارہ", "بلال", "مریم", "خالد"];
        const messages = [
            "سلام!",
            "کیا حال ہے؟",
            "بہت اچھا لائیو ہے!",
            "مزید گانا سنائیں",
            "واہ واہ!",
            "کتنے پیارے ہیں",
            "لاہور سے سلام",
            "کراچی زندہ باد",
            "سب کو سلام",
            "ایپ بہت اچھی ہے"
        ];
        const gifts = [
            { icon: "🌹", text: "گلاب" },
            { icon: "🚗", text: "کار" },
            { icon: "👑", text: "تاج" },
            { icon: "🍕", text: "پیزا" },
            { icon: "💎", text: "ہیرا" }
        ];

        // Auto update viewers
        setInterval(() => {
            const change = Math.floor(Math.random() * 20) - 10;
            viewers += change;
            if(viewers < 100) viewers = 100;
            viewersEl.innerText = viewers.toLocaleString();
        }, 3000);

        // Auto messages simulation
        setInterval(() => {
            if(Math.random() > 0.3) {
                const name = names[Math.floor(Math.random() * names.length)];
                const msg = messages[Math.floor(Math.random() * messages.length)];
                addMessage(name, msg, false);
            }
        }, 2000);

        function handleEnter(e) {
            if(e.key === 'Enter') sendMessage();
        }

        function sendMessage() {
            const text = msgInput.value.trim();
            if(text) {
                addMessage("آپ", text, true);
                msgInput.value = "";
                // Simulate reply sometimes
                if(Math.random() > 0.7) {
                    setTimeout(() => {
                        const name = names[Math.floor(Math.random() * names.length)];
                        const replies = ["ماشاءاللہ", "بالکل", "صحکہ کہا", "😂😂", "واہ"];
                        addMessage(name, replies[Math.floor(Math.random() * replies.length)], false);
                    }, 1500);
                }
            }
        }

        function addMessage(name, text, isMy) {
            const div = document.createElement('div');
            div.className = `message ${isMy ? 'my' : 'other'}`;
            div.innerHTML = `<div class="username">${name}</div>${text}`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            // Remove old messages if too many
            if(chatContainer.children.length > 50) {
                chatContainer.removeChild(chatContainer.firstChild);
            }
        }

        function sendLike() {
            for(let i=0; i<5; i++) {
                setTimeout(() => createFloatingElement('❤️'), i * 100);
            }
        }

        function sendGift() {
            const gift = gifts[Math.floor(Math.random() * gifts.length)];
            giftIcon.innerText = gift.icon;
            giftText.innerText = `آپ نے ${gift.text} بھیجا!`;
            giftPopup.style.display = 'block';
            
            createFloatingElement(gift.icon, true);
            
            setTimeout(() => {
                giftPopup.style.display = 'none';
            }, 2000);
        }

        function createFloatingElement(emoji, isBig = false) {
            const el = document.createElement('div');
            el.className = 'floating-element';
            el.innerText = emoji;
            el.style.left = Math.random() * 80 + 10 + '%';
            el.style.fontSize = isBig ? '60px' : '30px';
            el.style.animationDuration = (Math.random() * 1 + 1.5) + 's';
            effectsContainer.appendChild(el);
            
            setTimeout(() => {
                el.remove();
            }, 2500);
        }
    </script>
</body>
</html>
